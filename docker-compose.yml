services:
  api:
    image: mcdataxdev/edurisk-api:latest
    expose:
      - "5000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: mcdataxdev/edurisk-nginx:latest
    ports:
      - "80:80"
    depends_on:
      - api