services:
  api:
    image: mcdataxdev/edurisk-api:latest
    # Sin 'ports': el puerto 5000 NO se expone al host. Solo accesible por red Docker.
    expose:
      - "5000"
    env_file:
      - .env
    # Rearranca solo si el contenedor falla; sobrevive a reboots de EC2.
    restart: unless-stopped
    # Healthcheck con Python (urllib) en vez de curl — la imagen python:slim no trae curl.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:5000/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Límites de RAM para evitar OOM en t3.small (2 GB total).
    # sklearn cargado + Gunicorn cabe en ~1 GB; deja margen para el sistema.
    mem_limit: 1200m
    mem_reservation: 800m

  nginx:
    image: mcdataxdev/edurisk-nginx:latest
    ports:
      - "80:80"
    restart: unless-stopped
    # Arranca solo cuando la API responde healthcheck esté OK y evita 502 de bienvenida.
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 128m
